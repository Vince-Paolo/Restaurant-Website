<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<aside class="sidebar">
    <div class="brand">Ember<span>&</span>Salt</div>
    <nav>
        <a href="dashboard.html"><span class="icon">📊</span><span class="label">Dashboard</span></a>
        <a href="menu-management.html"><span class="icon">🍽️</span><span class="label">Menu Items</span></a>
        <a href="reservations.html" class="active"><span class="icon">📅</span><span class="label">Reservations</span></a>
        <a href="orders.html"><span class="icon">🧾</span><span class="label">Orders</span></a>
        <a href="../index.html"><span class="icon">🌐</span><span class="label">View Site</span></a>
    </nav>
    <div class="logout"><a href="../php/logout.php"><span class="icon">↪</span><span class="label">Sign Out</span></a></div>
</aside>

<main class="admin-main">
    <div class="admin-header">
        <h1>Reservations</h1>
        <button class="btn-refresh" id="refresh-btn" onclick="load(currentFilter)"><span class="icon">↻</span> Refresh</button>
    </div>

    <div class="filter-tabs">
        <button class="tab active" data-status="" onclick="setFilter('')">All</button>
        <button class="tab" data-status="Pending" onclick="setFilter('Pending')">Pending</button>
        <button class="tab" data-status="Confirmed" onclick="setFilter('Confirmed')">Confirmed</button>
        <button class="tab" data-status="Cancelled" onclick="setFilter('Cancelled')">Cancelled</button>
    </div>

    <div class="panel">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr><th>Name</th><th>Email</th><th>Date &amp; Time</th><th>Guests</th><th>Special Requests</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="res-tbody">
                    <tr class="skeleton-row"><td colspan="7">Loading</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div class="toast-stack" id="toast-stack"></div>
<script>
    fetch('../php/auth_check.php').then(r=>r.json()).then(d=>{ if(!d.success) window.location.href='../login.html'; }).catch(()=>window.location.href='../login.html');

    let currentFilter = '';
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(msg,type='success'){
        const s=document.getElementById('toast-stack');
        const t=document.createElement('div');
        t.className=`toast ${type}`; t.textContent=msg;
        s.appendChild(t);
        requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
        setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350)},3000);
    }
    function badge(status) {
        const m = {Pending:'pending',Confirmed:'confirmed',Cancelled:'cancelled'};
        return `<span class="badge badge-${m[status]||'pending'}">${status}</span>`;
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.status === f));
        load(f);
    }

    async function load(status='') {
        const btn = document.getElementById('refresh-btn');
        btn.classList.add('loading');
        const url = '../php/admin_reservations.php?action=read' + (status ? '&status='+status : '');
        const r = await fetch(url);
        const d = await r.json();
        const tbody = document.getElementById('res-tbody');
        setTimeout(() => btn.classList.remove('loading'), 300);
        if (!d.success) { toast(d.message || 'Failed to load.','error'); return; }
        if (!d.data.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No reservations found.</td></tr>';
            return;
        }
        tbody.innerHTML = d.data.map((res,i) => `
            <tr id="resrow-${res.id}" class="row-in" style="animation-delay:${i*30}ms">
                <td><strong>${esc(res.name)}</strong></td>
                <td style="font-size:0.8rem">${esc(res.email)}</td>
                <td style="white-space:nowrap">${esc(res.reservation_date)}<br><small style="color:var(--warm-mid)">${esc(res.reservation_time)}</small></td>
                <td style="text-align:center">${res.guests}</td>
                <td style="max-width:180px;font-size:0.8rem;color:var(--warm-mid)">${esc(res.special_requests||'–')}</td>
                <td>${badge(res.status)}</td>
                <td>
                    <div class="action-btns">
                        ${res.status!=='Confirmed' ? `<button class="btn-action confirm" onclick="updateStatus(${res.id},'Confirmed')">Confirm</button>` : ''}
                        ${res.status!=='Cancelled' ? `<button class="btn-action cancel"  onclick="updateStatus(${res.id},'Cancelled')">Cancel</button>` : ''}
                        <button class="btn-action delete" onclick="deleteRes(${res.id})">Delete</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    async function updateStatus(id, status) {
        const fd = new FormData();
        fd.append('action','update_status'); fd.append('id',id); fd.append('status',status);
        const r = await fetch('../php/admin_reservations.php',{method:'POST',body:fd});
        const d = await r.json();
        d.success ? (toast(d.message), load(currentFilter)) : toast(d.message,'error');
    }

    async function deleteRes(id) {
        if(!confirm('Delete this reservation?')) return;
        const fd = new FormData();
        fd.append('action','delete'); fd.append('id',id);
        const r = await fetch('../php/admin_reservations.php',{method:'POST',body:fd});
        const d = await r.json();
        d.success ? (toast('Reservation deleted.'), load(currentFilter)) : toast(d.message,'error');
    }

    load();
</script>
</body>
</html>
