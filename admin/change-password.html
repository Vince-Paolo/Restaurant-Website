<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .pw-wrap { max-width: 460px; }
        .pw-hint { font-size: 0.8rem; color: var(--warm-mid); margin-top: 0.35rem; }
        .pw-error { color: var(--ember); font-size: 0.85rem; margin-top: 0.75rem; text-align:center; display:none; }
        .pw-error.show { display:block; }
        .pw-banner {
            background: rgba(200,90,60,0.1);
            border: 1px solid rgba(200,90,60,0.25);
            border-radius: var(--radius-sm);
            padding: 0.9rem 1.1rem;
            font-size: 0.85rem;
            color: var(--ink);
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Ember<span>&</span>Salt</div>
    <nav>
        <a href="dashboard.html"><span class="icon">📊</span><span class="label">Dashboard</span></a>
        <a href="menu-management.html"><span class="icon">🍽️</span><span class="label">Menu Items</span></a>
        <a href="reservations.html"><span class="icon">📅</span><span class="label">Reservations</span></a>
        <a href="orders.html"><span class="icon">🧾</span><span class="label">Orders</span></a>
        <a href="../index.html"><span class="icon">🌐</span><span class="label">View Site</span></a>
    </nav>
    <div class="logout"><a href="../php/logout.php"><span class="icon">↪</span><span class="label">Sign Out</span></a></div>
</aside>

<main class="admin-main">
    <div class="admin-header">
        <h1>Change Password</h1>
    </div>

    <div class="pw-wrap form-panel">
        <div class="pw-banner" id="forced-banner" style="display:none">
            For security, you must set a new password before continuing — this account is still using the default seeded credentials.
        </div>

        <form id="pw-form" novalidate>
            <input type="hidden" name="csrf_token" id="csrf-token">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group" style="margin-top:0.75rem">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required>
                <p class="pw-hint">At least 8 characters, with an uppercase letter and a number.</p>
            </div>
            <div class="form-group" style="margin-top:0.75rem">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div class="form-actions" style="margin-top:1.25rem">
                <button type="submit" class="btn-save" id="save-btn">Update Password</button>
            </div>
            <p class="pw-error" id="pw-error"></p>
        </form>
    </div>
</main>

<div class="toast-stack" id="toast-stack"></div>

<script src="../js/customer-auth.js"></script>
<script>
    let mustChange = false;

    fetch('../php/auth_check.php').then(r=>r.json()).then(d => {
        if (!d.success) { window.location.href = '../login.html'; return; }
        mustChange = !!d.data.must_change_password;
        document.getElementById('forced-banner').style.display = mustChange ? 'block' : 'none';
    }).catch(() => window.location.href = '../login.html');

    function toast(msg, type='success') {
        const stack = document.getElementById('toast-stack');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        stack.appendChild(t);
        requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
        setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),350); },3000);
    }

    async function refreshCsrf() {
        const token = await getCsrfToken('admin_action');
        if (token) document.getElementById('csrf-token').value = token;
    }
    refreshCsrf();

    const form    = document.getElementById('pw-form');
    const errorEl = document.getElementById('pw-error');
    const saveBtn = document.getElementById('save-btn');

    form.addEventListener('submit', async e => {
        e.preventDefault();
        errorEl.classList.remove('show');

        saveBtn.disabled = true;
        saveBtn.textContent = 'Updating…';

        try {
            const fd = new FormData(form);
            const r  = await fetch('../php/admin_change_password.php', { method:'POST', body: fd });
            const d  = await r.json();

            if (d.success) {
                toast(d.message || 'Password updated!');
                setTimeout(() => window.location.href = d.data.redirect || 'dashboard.html', 500);
            } else {
                errorEl.textContent = d.message || 'Could not update password.';
                errorEl.classList.add('show');
                saveBtn.disabled = false;
                saveBtn.textContent = 'Update Password';
                await refreshCsrf();
            }
        } catch {
            errorEl.textContent = 'Network error. Please try again.';
            errorEl.classList.add('show');
            saveBtn.disabled = false;
            saveBtn.textContent = 'Update Password';
        }
    });
</script>
</body>
</html>
