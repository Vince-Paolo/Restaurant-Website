databases:
  # Render's managed Postgres — free tier, no card required for this part.
  - name: restaurant-postgres
    databaseName: restaurant_db
    plan: free

services:
  # --- PHP application ---
  - type: web
    name: restaurant-website
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: restaurant-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: restaurant-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: restaurant-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: restaurant-postgres
          property: user
      - key: DB_PASS
        fromDatabase:
          name: restaurant-postgres
          property: password
      # Used by docker-entrypoint.sh to auto-import the schema on boot.
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-postgres
          property: connectionString
